<!DOCTYPE html>
<html>
<head>
<style>
.container {
  display: flex;
  height:500px;
  width:1000px;
  padding:20px;
  background-color: aqua;
  display :flex;
  justify-content:center;
  align-items:center;
}

.container .box {
  background-color: peachpuff;
  height:140px;
  color: solid red;
  padding: 20px;
  margin: 200px;
  border:solid red;
}
</style>
</head>
<body>

<h2>Flexbox Example</h2>

<div class="container">
  <div class="box">Box 1</div>
  <div class="box">Box 2</div>
  <div class="box">Box 3</div>
</div>

</body>
</html>
