<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>About Me</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 40px;          /* Outer space */
        }

        h1 {
            color: solid red;
            text-align: center;
            margin-bottom: 20px;   /* Space below heading */
        }

        ol {
            background-color: solid red;
            padding: 20px;         /* Inner space */
            border: 3px solid darkblue; /* Border */
            border-radius: 10px;
            width: 300px;
            margin: auto;          /* Center the list */
        }

        li {
            padding: 8px;          /* Space inside each item */
            margin: 5px 0;         /* Space between items */
            border-bottom: 1px solid red;
        }
    </style>
</head>

<body>

    <h1>My Favourite Foods</h1>

    <ol>
        <li>Biriyani</li>
        <li>Dal Rice</li>
        <li>Chicken</li>
        <li>Ice cream</li>
        <li>Brinjal curry</li>
    </ol>

</body>
</html>
