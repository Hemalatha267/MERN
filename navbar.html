<!DOCTYPE html>
<html>
<head>
<style>
body {
  margin: 0;
  font-family: Arial;
}

.navbar {
  background-color: blue;   /* fixed */
  padding: 15px;
}

.navbar ul {
  list-style: none;        /* remove bullets */
  margin: 0;
  padding: 0;
  display: flex;           /* make items horizontal */
}

.navbar li {
  margin-right: 20px;
}

.navbar li a {
  color: white;            /* fixed */
  text-decoration: none;
}

.navbar li a:hover {
  color: yellow;
}
</style>
</head>
<body>

<div class="navbar">
  <ul>
    <li><a href="#">Home</a></li>
    <li><a href="#">About</a></li>
    <li><a href="#">Services</a></li>
    <li><a href="#">Contact</a></li>
  </ul>
</div>

</body>
</html>
